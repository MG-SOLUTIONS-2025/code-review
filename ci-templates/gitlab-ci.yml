stages:
  - security_scan
  - triage_findings
  - ai_review
  - upload_results

variables:
  DEFECTDOJO_URL: "${DEFECTDOJO_URL}/api/v2/import-scan/"
  DEFECTDOJO_ENGAGEMENT_ID: "${DEFECTDOJO_ENGAGEMENT_ID}"

# --- SAST ---
semgrep:
  stage: security_scan
  image: semgrep/semgrep:latest
  script:
    - semgrep scan . --config="p/default" --config="p/owasp-top-ten"
      --metrics="off" --json -o semgrep_report.json
  artifacts:
    paths: [semgrep_report.json]
    when: always
    expire_in: 90 days

# --- Secrets ---
gitleaks:
  stage: security_scan
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . -f json -r gitleaks_report.json
      --config=config/gitleaks/.gitleaks.toml --exit-code 1
  artifacts:
    paths: [gitleaks_report.json]
    when: always
    expire_in: 90 days
  allow_failure: true

# --- Dependencies (MR only) ---
trivy:
  stage: security_scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --format json --output trivy_report.json --severity HIGH,CRITICAL .
  artifacts:
    paths: [trivy_report.json]
    when: always
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- SAST Triage (MR only) ---
triage_findings:
  stage: triage_findings
  image: python:3.12-slim
  timeout: 1h
  needs: [semgrep]
  script:
    - pip install requests -q
    - |
      python3 scripts/triage-findings.py \
        --report semgrep_report.json \
        --prompt-file config/prompts/triage.md \
        --llm-url "http://${LLM_HOST:-ollama}:${LLM_PORT:-11434}" \
        --model "${LLM_MODEL:-qwen2.5-coder:32b}" \
        --engine "${INFERENCE_ENGINE:-ollama}" \
        --git-platform gitlab \
        --git-url "${CI_SERVER_URL}" \
        --git-token "${GIT_TOKEN}" \
        --project "${CI_PROJECT_PATH}" \
        --mr-id "${CI_MERGE_REQUEST_IID}" \
        --output triage_results.json
  artifacts:
    paths: [triage_results.json]
    when: always
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- AI Review (MR only) ---
ai_review:
  stage: ai_review
  image: curlimages/curl:latest
  variables:
    GATEWAY_URL: "${GATEWAY_URL:-http://api-gateway:8000}"
  script:
    - |
      curl -sf -X POST "${GATEWAY_URL}/api/reviews/run" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${GATEWAY_API_TOKEN:-}" \
        -d "{
          \"platform\": \"gitlab\",
          \"project_id\": \"${CI_PROJECT_ID}\",
          \"mr_id\": ${CI_MERGE_REQUEST_IID},
          \"force\": false
        }" \
        --max-time 600 || exit 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  timeout: 15m

# --- Upload to DefectDojo ---
upload_results:
  stage: upload_results
  image: python:3.12-slim
  when: always
  script:
    - pip install requests -q
    - |
      python3 scripts/upload-to-defectdojo.py \
        --file semgrep_report.json --scan-type "Semgrep JSON Report" \
        --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" || true
    - |
      python3 scripts/upload-to-defectdojo.py \
        --file gitleaks_report.json --scan-type "Gitleaks Scan" \
        --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" || true
    - |
      python3 scripts/upload-to-defectdojo.py \
        --file trivy_report.json --scan-type "Trivy Scan" \
        --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" || true
    - |
      if [ -f triage_results.json ]; then
        python3 scripts/upload-to-defectdojo.py \
          --file triage_results.json --scan-type "Generic Findings Import" \
          --engagement-id "$DEFECTDOJO_ENGAGEMENT_ID" || true
      fi
